<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560">
  <defs>
    <style>
      .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 8; }
      .title { font: 700 18px Arial, sans-serif; fill: #111827; }
      .text { font: 14px Arial, sans-serif; fill: #111827; }
      .small { font: 12px Arial, sans-serif; fill: #374151; }
      .line { stroke: #1f2937; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .bus { stroke: #2563eb; stroke-width: 5; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937" />
    </marker>
  </defs>

  <rect x="345" y="30" width="230" height="82" class="box" />
  <text x="460" y="62" text-anchor="middle" class="title">Control Unit</text>
  <text x="460" y="86" text-anchor="middle" class="small">fetch, decode, execute</text>

  <rect x="70" y="170" width="210" height="130" class="box" />
  <text x="175" y="204" text-anchor="middle" class="title">Registers</text>
  <text x="175" y="232" text-anchor="middle" class="text">R0 R1 R2 R3</text>
  <text x="175" y="256" text-anchor="middle" class="text">PC SP IR FLAGS</text>

  <rect x="355" y="180" width="210" height="110" class="box" />
  <text x="460" y="220" text-anchor="middle" class="title">ALU</text>
  <text x="460" y="248" text-anchor="middle" class="text">add, sub, logic, shift</text>

  <rect x="640" y="170" width="210" height="130" class="box" />
  <text x="745" y="204" text-anchor="middle" class="title">Flags</text>
  <text x="745" y="232" text-anchor="middle" class="text">Z C N V</text>
  <text x="745" y="256" text-anchor="middle" class="small">zero, carry, negative, overflow</text>

  <path d="M280 235 H355" class="line" />
  <path d="M565 235 H640" class="line" />
  <path d="M460 112 V180" class="line" />

  <path d="M175 320 H745" class="bus" />
  <text x="460" y="350" text-anchor="middle" class="title">Internal Bus</text>

  <path d="M175 300 V320" class="line" />
  <path d="M460 290 V320" class="line" />
  <path d="M745 300 V320" class="line" />

  <rect x="180" y="405" width="230" height="100" class="box" />
  <text x="295" y="440" text-anchor="middle" class="title">Memory</text>
  <text x="295" y="468" text-anchor="middle" class="text">64 KB RAM / program space</text>

  <rect x="510" y="405" width="230" height="100" class="box" />
  <text x="625" y="440" text-anchor="middle" class="title">Memory Mapped IO</text>
  <text x="625" y="468" text-anchor="middle" class="text">console and timer registers</text>

  <path d="M295 320 V405" class="line" />
  <path d="M625 320 V405" class="line" />
</svg>
